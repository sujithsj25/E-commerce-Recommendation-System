{% extends 'base.html' %}

{% block content %}
<div class="auth-container"
    style="max-width: 450px; margin: 60px auto; padding: 40px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid #f1f5f9;">
    <div style="text-align: center; margin-bottom: 30px;">
        <div
            style="width: 60px; height: 60px; background: rgba(16,185,129,0.1); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px;">
            <i class="fa-solid fa-user-plus" style="font-size: 24px; color: #10b981;"></i>
        </div>
        <h2 style="font-weight: 800; font-size: 26px; margin: 0; color: #0f172a;">Join Sj_Store</h2>
        <p style="color: #64748b; font-size: 14px; margin-top: 8px;">Create an account to unlock recommendations</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div style="font-size: 14px; color: #1e293b; margin-bottom: 20px;">
            {{ form.as_p }}
        </div>
        <button type="submit"
            style="width: 100%; background: #10b981; color: white; border: none; padding: 14px; border-radius: 10px; font-weight: 600; font-size: 15px; cursor: pointer; transition: background 0.2s; box-shadow: 0 4px 12px rgba(16,185,129,0.25);">Create
            Account</button>
    </form>

    <div
        style="margin-top: 25px; font-size: 13px; text-align: center; color: #64748b; line-height: 1.5; border-bottom: 1px solid #e2e8f0; padding-bottom: 25px;">
        <p>By creating an account, you agree to Sj_Store's <a href="#"
                style="color: #10b981; text-decoration: none; font-weight: 500;">Conditions of Use</a>.</p>
    </div>

    <div style="margin-top: 25px; text-align: center;">
        <p style="font-size: 14px; color: #64748b; margin-bottom: 15px;">Already have an account?</p>
        <a href="{% url 'login' %}"
            style="display: block; width: 100%; text-align: center; padding: 13px; background: white; border: 1px solid #cbd5e1; border-radius: 10px; color: #0f172a; font-weight: 600; text-decoration: none; font-size: 14px; transition: all 0.2s;">Sign
            in instead</a>
    </div>
</div>

<style>
    /* Modernizing the default Django form rendering */
    .auth-container form p {
        margin-bottom: 15px;
    }

    .auth-container form label {
        display: block;
        margin-bottom: 6px;
        font-weight: 500;
        color: #475569;
    }

    .auth-container form input {
        width: 100%;
        padding: 12px 15px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-family: inherit;
        font-size: 14px;
        outline: none;
        box-sizing: border-box;
        transition: all 0.2s;
    }

    .auth-container form input:focus {
        border-color: #10b981;
        box-shadow: 0 0 0 3px rgba(16, 185, 129, 0.1);
    }
</style>
{% endblock %}
